<form id="form-master-barang" enctype="multipart/form-data">
    <div class="modal-header">
        <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
        <h4 class="modal-title">{if: $mode == 'edit'}Edit Data Barang{else}Tambah Data Barang{/if}</h4>
    </div>
    <div class="modal-body">
        <div class="row">
            <div class="col-md-6">
                <div class="form-group">
                    <label>Kode Item</label>
                    <input type="text" name="kode_item" class="form-control" value="{$barang.kode_item}" {if: $mode == 'edit'}readonly{/if} required>
                </div>
                <div class="form-group">
                    <label>Nama Barang</label>
                    <input type="text" name="nama_barang" class="form-control" value="{$barang.nama_barang}" required>
                </div>
                <div class="form-group">
                    <label>Kategori</label>
                    <select name="kategori" class="form-control select2" style="width:100%">
                        <option value="">-- Pilih Kategori --</option>
                        {loop: $kategori}
                        <option value="{$value.nama_kategori}" {if: $barang.kategori == $value.nama_kategori}selected{/if}>{$value.nama_kategori}</option>
                        {/loop}
                    </select>
                </div>
                <div class="form-group">
                    <label>Jenis Pengadaan / Permintaan</label>
                    <select name="jenis_item" class="form-control">
                        <option value="Rutin" {if: $barang.jenis_item == 'Rutin'}selected{/if}>Rutin (Rutin Mingguan / Langsung Logistik)</option>
                        <option value="Non Rutin" {if: $barang.jenis_item == 'Non Rutin'}selected{/if}>Non-Rutin (Pengajuan Insidental / Approval Kanit/Kasie/Kabid)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Satuan Dasar</label>
                    <select name="satuan_dasar" class="form-control select2" style="width:100%" id="select-satuan-dasar" required>
                        <option value="">-- Pilih Satuan --</option>
                        {loop: $satuan}
                        <option value="{$value.nama_satuan}" data-dasar="{$value.satuan_dasar}" data-konversi="{$value.nilai_konversi}" {if: $barang.satuan_dasar == $value.nama_satuan}selected{/if}>{$value.nama_satuan}</option>
                        {/loop}
                    </select>
                </div>
                <div class="form-group">
                    <label>Harga Referensi (HPS)</label>
                    <input type="text" name="harga_referensi" class="form-control currency" value="{if: $barang.harga_referensi != ''}Rp. {?=number_format($barang.harga_referensi,0,',','.')?}{/if}" placeholder="Rp. 0" required>
                </div>
            </div>
            <div class="col-md-6">
                <div class="form-group">
                    <label>Barcode / QR String</label>
                    <input type="text" name="barcode" class="form-control" value="{$barang.barcode}">
                </div>
                <div class="form-group">
                    <label>Deskripsi</label>
                    <textarea name="deskripsi" class="form-control" rows="2">{$barang.deskripsi}</textarea>
                </div>
                <div class="form-group">
                    <label>Sub-Kategori</label>
                    <input type="text" name="sub_kategori" class="form-control" value="{$barang.sub_kategori}">
                </div>
                <div class="form-group">
                    <label>Satuan Konversi</label>
                    <input type="text" name="satuan_konversi" class="form-control" id="satuan_konversi" value="{$barang.satuan_konversi}" placeholder="Contoh: 1 BOX = 12 PCS">
                </div>
                <div class="form-group">
                    <label>Default Lokasi Gudang</label>
                    <select name="default_kode_lokasi" class="form-control select2" style="width:100%">
                        <option value="">-- Pilih Lokasi --</option>
                        {loop: $lokasi}
                        <option value="{$value.kode_lokasi}" {if: $barang.default_kode_lokasi == $value.kode_lokasi}selected{/if}>{$value.rak} / {$value.bin} / {$value.slot} ({$value.kode_lokasi})</option>
                        {/loop}
                    </select>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select name="status" class="form-control">
                        <option value="Aktif" {if: $barang.status == 'Aktif'}selected{/if}>Aktif</option>
                        <option value="Tidak Aktif" {if: $barang.status == 'Tidak Aktif'}selected{/if}>Tidak Aktif</option>
                    </select>
                </div>
        </div>
        <div class="row" style="background: #f9f9f9; padding: 15px; margin: 10px 0; border-radius: 5px; border: 1px dashed #ccc;">
            <div class="col-md-4">
                <div class="form-group">
                    <label style="color: #d9534f;"><i class="fa fa-warning"></i> Stok Min (Reorder)</label>
                    <input type="number" name="stok_min" class="form-control" value="{$barang.stok_min}" step="any">
                </div>
            </div>
            <div class="col-md-4">
                <div class="form-group">
                    <label style="color: #5bc0de;"><i class="fa fa-info-circle"></i> Stok Max (Kapasitas)</label>
                    <input type="number" name="stok_max" class="form-control" value="{$barang.stok_max}" step="any">
                </div>
            </div>
            <div class="col-md-4">
                <div class="form-group">
                    <label style="color: #f0ad4e;"><i class="fa fa-life-ring"></i> Safety Stock (Kritis)</label>
                    <input type="number" name="safety_stock" class="form-control" value="{$barang.safety_stock}" step="any">
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-md-12">
                <div class="form-group">
                    <label>Spesifikasi Teknis</label>
                    <textarea name="spesifikasi" class="form-control" rows="3">{$barang.spesifikasi}</textarea>
                </div>
            </div>
            <div class="col-md-6">
                <div class="form-group">
                    <label>Foto Barang (Optional)</label>
                    <input type="file" name="foto" class="form-control" accept="image/*">
                    {if: $barang.foto != ''}
                    <small>File saat ini: {$barang.foto}</small>
                    {/if}
                </div>
            </div>
            <div class="col-md-6">
                <div class="form-group">
                    <label>Dokumen Teknis (Optional)</label>
                    <input type="file" name="dokumen" class="form-control" accept=".pdf,.doc,.docx,.xls,.xlsx">
                    {if: $barang.dokumen != ''}
                    <small>File saat ini: {$barang.dokumen}</small>
                    {/if}
                </div>
            </div>
        </div>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-default" data-dismiss="modal">Batal</button>
        <button type="submit" class="btn btn-primary" id="btn-save-barang">Simpan</button>
    </div>
</form>
