<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Cetak Label Aset - {$aset.kode_aset}</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fff;
            color: #000;
        }
        /* Label Box Dimensions Optimized for standard 50mm x 30mm or similar thermal stickers */
        .label-sticker {
            width: 380px;
            height: 200px;
            border: 2px solid #000;
            border-radius: 4px;
            padding: 10px;
            margin: 20px auto;
            box-sizing: border-box;
            display: flex;
            flex-direction: row;
            align-items: center;
            overflow: hidden;
            background-color: #fff;
        }
        .qr-section {
            width: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
        }
        .qr-image {
            width: 105px;
            height: 105px;
            border: 1px solid #000;
            padding: 2px;
        }
        .qr-subtext {
            font-size: 8px;
            font-weight: bold;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .info-section {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }
        .header-brand {
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            border-bottom: 2px double #000;
            padding-bottom: 3px;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
            text-align: center;
        }
        .asset-code {
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            font-weight: 800;
            margin: 2px 0;
            color: #000;
        }
        .asset-name {
            font-size: 11px;
            font-weight: 700;
            line-height: 1.2;
            height: 2.4em;
            overflow: hidden;
            margin: 3px 0;
            text-transform: uppercase;
        }
        .meta-row {
            font-size: 9px;
            margin: 2px 0;
        }
        .meta-row span {
            font-weight: 800;
            text-transform: uppercase;
        }
        .footer-note {
            font-size: 7px;
            text-align: right;
            border-top: 1px dashed #000;
            padding-top: 2px;
            margin-top: 3px;
            font-style: italic;
        }

        /* Print Media Styles to remove headers, margins, and force fits */
        @media print {
            body {
                margin: 0;
                padding: 0;
            }
            .label-sticker {
                margin: 0;
                border: 2px solid #000;
                page-break-inside: avoid;
            }
            /* Hide generic browser headers/footers */
            @page {
                size: auto;
                margin: 0;
            }
        }
    </style>
</head>
<body>

    <div class="label-sticker">
        
        <!-- Left Side: QR Code -->
        <div class="qr-section">
            <img class="qr-image" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data={?=urlencode($scan_url)?}" alt="Aset QR Code">
            <div class="qr-subtext">SCAN UNTUK DETAIL</div>
        </div>
        
        <!-- Right Side: Info details -->
        <div class="info-section">
            <div>
                <div class="header-brand">INVENTARIS ASET NON-MEDIS</div>
                <div class="asset-code">{$aset.kode_aset}</div>
                <div class="asset-name">{$aset.nama_aset}</div>
            </div>
            
            <div>
                <div class="meta-row">UNIT: <span>{$aset.nama_unit}</span></div>
                <div class="meta-row">PIC: <span>{$aset.pic}</span></div>
                {if: !empty($aset.serial_number)}
                <div class="meta-row" style="font-size: 8px;">S/N: <span style="font-family: monospace;">{$aset.serial_number}</span></div>
                {/if}
                <div class="footer-note">SIMRS mLite - Logistik Non-Medis</div>
            </div>
        </div>
        
    </div>

    <script>
        window.onload = function() {
            window.print();
            // Automatically close the print window after print dialog is closed
            setTimeout(function() {
                window.close();
            }, 1000);
        }
    </script>
</body>
</html>
