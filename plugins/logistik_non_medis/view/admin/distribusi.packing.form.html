<div class="modal-header">
    <button type="button" class="close" data-dismiss="modal">&times;</button>
    <h4 class="modal-title">Pengemasan & Labeling (Packing) - {$no_sppb}</h4>
</div>
<div class="modal-body">
    <form id="form_packing_save_final">
        <input type="hidden" name="no_sppb" value="{$no_sppb}">
        <div class="alert alert-info">
            <i class="fa fa-info-circle"></i> Kelompokkan barang ke dalam Koli/Paket dan isi berat estimasi.
        </div>
        <div class="table-responsive">
            <table class="table table-bordered table-condensed">
                <thead>
                    <tr class="bg-success">
                        <th>Barang</th>
                        <th>Batch</th>
                        <th>Jumlah Picked</th>
                        <th width="100">Koli Ke-</th>
                        <th width="150">Berat (Kg)</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    {loop: $items}
                    <tr>
                        <td><strong>{$value.nama_barang}</strong></td>
                        <td>{$value.batch_no}</td>
                        <td class="text-center">{$value.qty_picked}</td>
                        <td>
                            <input type="number" name="packing[{$value.id}][koli_ke]" class="form-control input-sm" value="{$value.koli_ke}" min="1">
                        </td>
                        <td>
                            <div class="input-group input-group-sm">
                                <input type="number" step="0.01" name="packing[{$value.id}][berat]" class="form-control" value="{$value.total_berat_koli}">
                                <span class="input-group-addon">Kg</span>
                            </div>
                        </td>
                        <td>
                            <button type="button" class="btn btn-xs btn-default" title="Cetak Label Koli" onclick="printLabel('{$value.no_packing}', '{$value.koli_ke}')">
                                <i class="fa fa-barcode"></i> Label
                            </button>
                        </td>
                    </tr>
                    {/loop}
                </tbody>
            </table>
        </div>
    </form>
</div>
<div class="modal-footer">
    <button type="button" class="btn btn-default" data-dismiss="modal">Tutup</button>
    <button type="button" class="btn btn-info" onclick="savePackingData()">Simpan Data Packing</button>
    <button type="button" class="btn btn-success" onclick="finalizePacking()">Selesaikan & Siap Kirim</button>
</div>

<script>
function savePackingData() {
    var formData = $('#form_packing_save_final').serialize();
    $.post('{?=url(ADMIN."/logistik_non_medis/savepacking")?}', formData, function(response) {
        var res = JSON.parse(response);
        if(res.status == 'success') {
            alert('Data packing berhasil disimpan.');
        } else {
            alert('Gagal: ' + res.message);
        }
    });
}

function finalizePacking() {
    if(confirm('Apakah Anda yakin sudah menyelesaikan packing dan siap dikirim? Status SPPB akan berubah menjadi Ready.')) {
        $.post('{?=url(ADMIN."/logistik_non_medis/finalizepacking")?}', {
            no_sppb: '{$no_sppb}'
        }, function(response) {
            var res = JSON.parse(response);
            if(res.status == 'success') {
                alert('SPPB siap dikirim!');
                $('#modalPacking').modal('hide');
                loadPacking();
            } else {
                alert('Gagal: ' + res.message);
            }
        });
    }
}

function printLabel(no_packing, koli) {
    window.open('{?=url(ADMIN."/logistik_non_medis/printpackinglabel")?}&no_packing=' + encodeURIComponent(no_packing) + '&koli=' + koli, '_blank');
}
</script>
