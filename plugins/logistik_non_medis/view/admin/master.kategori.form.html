<div class="modal-body">
    <form id="form-kategori" class="form-horizontal">
        <input type="hidden" name="id" value="{$kategori.id}">
        <div class="form-group">
            <label class="col-sm-3 control-label">Nama Kategori</label>
            <div class="col-sm-9">
                <input type="text" name="nama_kategori" class="form-control" value="{$kategori.nama_kategori}" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">Deskripsi</label>
            <div class="col-sm-9">
                <textarea name="deskripsi" class="form-control" rows="3">{$kategori.deskripsi}</textarea>
            </div>
        </div>
    </form>
</div>
<div class="modal-footer">
    <button type="button" class="btn btn-default" data-dismiss="modal">Batal</button>
    <button type="submit" form="form-kategori" class="btn btn-primary" id="btn-simpan-kategori">Simpan</button>
</div>
