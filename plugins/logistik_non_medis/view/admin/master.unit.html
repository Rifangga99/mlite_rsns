<style>
    #table-master-unit th, #table-master-unit td {
        vertical-align: middle;
        padding: 12px 8px;
    }
    .panel-body {
        padding: 20px;
    }
    .action-row {
        margin-bottom: 25px;
    }
</style>
<article class="row">
    <div class="col-md-12">
        <div class="panel panel-default">
            <div class="panel-heading">
                <h3 class="panel-title">Data Unit & Departemen <small>(Total: <span id="total-unit">0</span>)</small></h3>
                <ul class="nav nav-tabs">
                    <li class="active"><a href="{?=url([ADMIN, 'logistik_non_medis', 'masterunit'])?}">Data Unit</a></li>
                </ul>
            </div>
            <div class="panel-body">
                <div class="row clearfix action-row">
                    <div class="col col-md-6">
                        <button type="button" class="btn btn-primary" id="btn-tambah-unit"><i class="fa fa-plus"></i> Tambah Unit Baru</button>
                    </div>
                    <div class="col col-md-6">
                        <form action="" class="searchbox-masterunit">
                            <div class="input-group">
                                <input type="text" name="cari" class="form-control" placeholder="Pencarian Nama Unit/Kode/PJ..." value="">
                                <span class="input-group-btn">
                                    <button class="btn btn-default" type="submit"><i class="fa fa-search"></i> Cari</button>
                                </span>
                            </div>
                        </form>
                    </div>
                </div>
                
                <div class="table-responsive no-margin">
                    <table class="table table-striped no-margin dataTable" id="table-master-unit">
                        <thead>
                            <tr>
                                <th>Kode Unit</th>
                                <th>Nama Unit</th>
                                <th>PJ Unit</th>
                                <th>Lokasi</th>
                                <th>Cost Center</th>
                                <th>Kuota</th>
                                <th>Status</th>
                                <th class="text-right">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="master-unit-list">
                            <tr>
                                <td colspan="8" class="text-center">
                                    <i class="fa fa-spinner fa-spin fa-2x"></i>
                                    <p>Memuat data...</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <div class="row clearfix" style="margin-top: 15px;">
                    <div class="col-md-12 text-right">
                        <ul class="pagination pagination-sm pagination-master-unit" style="margin:0;">
                            <!-- Pagination goes here -->
                        </ul>
                    </div>
                </div>

            </div>
        </div>
    </div>
</article>

<!-- Modal Form -->
<div class="modal fade" id="modal-form-unit" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content" id="form-unit-content">
            <!-- Form loaded via AJAX -->
        </div>
    </div>
</div>
