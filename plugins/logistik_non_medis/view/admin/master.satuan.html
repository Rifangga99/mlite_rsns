<article class="row">
    <div class="col-md-12">
        <div class="panel panel-default">
            <div class="panel-heading">
                <h3 class="panel-title">Data Satuan Barang</h3>
            </div>
            <div class="panel-body">
                <div class="row clearfix" style="margin-bottom: 20px;">
                    <div class="col-md-6">
                        <button type="button" class="btn btn-primary" id="btn-tambah-satuan">
                            <i class="fa fa-plus"></i> Tambah Satuan
                        </button>
                    </div>
                    <div class="col-md-6">
                        <form class="searchbox-mastersatuan">
                            <div class="input-group">
                                <input type="text" name="cari" class="form-control" placeholder="Cari Kode atau Nama Satuan...">
                                <span class="input-group-btn">
                                    <button class="btn btn-default" type="submit"><i class="fa fa-search"></i> Cari</button>
                                </span>
                            </div>
                        </form>
                    </div>
                </div>
                
                <div class="table-responsive">
                    <table class="table table-striped table-hover no-margin" id="table-master-satuan">
                        <thead>
                            <tr>
                                <th>Kode</th>
                                <th>Nama Satuan</th>
                                <th>Satuan Dasar</th>
                                <th>Nilai Konversi</th>
                                <th class="text-right">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="master-satuan-list">
                            <tr>
                                <td colspan="5" class="text-center">
                                    <i class="fa fa-spinner fa-spin fa-2x"></i>
                                    <p>Memuat data...</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="row clearfix" style="margin-top: 15px;">
                    <div class="col-md-12 text-right">
                        <ul class="pagination pagination-sm pagination-master-satuan" style="margin:0;">
                            <!-- Pagination goes here -->
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</article>

<!-- Modal Form Satuan -->
<div class="modal fade" id="modal-form-satuan" tabindex="-1" role="dialog">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
                <h4 class="modal-title">Form Satuan Barang</h4>
            </div>
            <div id="form-satuan-content">
                <!-- AJAX Content -->
            </div>
        </div>
    </div>
</div>
