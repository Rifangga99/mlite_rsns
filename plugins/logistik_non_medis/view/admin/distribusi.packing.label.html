<!DOCTYPE html>
<html>
<head>
    <title>Label Packing - {$no_packing}</title>
    <style>
        @page { size: 10cm 10cm; margin: 0.5cm; }
        body { font-family: 'Courier New', Courier, monospace; font-size: 10px; margin: 0; padding: 0; }
        .label-box { border: 2px solid #000; padding: 10px; height: 8.5cm; position: relative; }
        .header { text-align: center; border-bottom: 1px dashed #000; padding-bottom: 5px; margin-bottom: 5px; }
        .dest { font-size: 14px; font-weight: bold; margin: 5px 0; }
        .pkg-info { font-size: 12px; margin-bottom: 10px; }
        .content-table { width: 100%; border-collapse: collapse; font-size: 9px; }
        .content-table th, .content-table td { border: 1px solid #000; padding: 2px; }
        .qr-code { position: absolute; bottom: 10px; right: 10px; text-align: center; }
        .qr-placeholder { width: 60px; height: 60px; border: 1px solid #000; line-height: 60px; font-size: 8px; }
    </style>
</head>
<body onload="window.print()">
    <div class="label-box">
        <div class="header">
            <strong>PACKING LABEL</strong><br>
            {$nama_rs}
        </div>
        
        <div class="dest">KEPADA: {$unit.nama_unit}</div>
        <div class="pkg-info">
            NO. SPPB: {$no_sppb}<br>
            NO. PACKING: <strong>{$no_packing}</strong><br>
            KOLI KE: <strong>{$koli}</strong>
        </div>

        <table class="content-table">
            <thead>
                <tr>
                    <th>Item</th>
                    <th width="30">Qty</th>
                </tr>
            </thead>
            <tbody>
                {loop: $items}
                <tr>
                    <td>{$value.nama_barang}</td>
                    <td align="center">{$value.qty_picked}</td>
                </tr>
                {/loop}
            </tbody>
        </table>

        <div class="qr-code">
            <div class="qr-placeholder">QR CODE<br>{$no_packing}</div>
            <small>{$no_packing}</small>
        </div>
        
        <div style="position: absolute; bottom: 10px; left: 10px;">
            Tgl: {?=date('d/m/Y')?}
        </div>
    </div>
</body>
</html>
