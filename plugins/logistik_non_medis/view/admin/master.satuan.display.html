{if: !empty($satuan)}
    {loop: $satuan}
    <tr>
        <td>{$value.kode_satuan}</td>
        <td>{$value.nama_satuan}</td>
        <td>{$value.satuan_dasar}</td>
        <td>{$value.nilai_konversi}</td>
        <td class="text-right">
            <div class="btn-group">
                <button type="button" class="btn btn-success btn-xs btn-edit-satuan" data-id="{$value.id}" title="Edit">
                    <i class="fa fa-edit"></i>
                </button>
                <button type="button" class="btn btn-danger btn-xs btn-hapus-satuan" data-id="{$value.id}" title="Hapus">
                    <i class="fa fa-trash"></i>
                </button>
            </div>
        </td>
    </tr>
    {/loop}
{else}
    <tr>
        <td colspan="5" class="text-center">Data tidak ditemukan.</td>
    </tr>
{/if}

<script>
    var halaman = {?= (int)$halaman ?};
    var jml_halaman = {?= (int)$jml_halaman ?};
    
    var pagination = '';
    if (jml_halaman > 1) {
        if (halaman > 1) {
            pagination += '<li><a href="javascript:void(0)" data-page="'+(halaman-1)+'">&laquo; Prev</a></li>';
        }
        for (var i = 1; i <= jml_halaman; i++) {
            if (i == halaman) {
                pagination += '<li class="active"><a href="javascript:void(0)" data-page="'+i+'">'+i+'</a></li>';
            } else {
                pagination += '<li><a href="javascript:void(0)" data-page="'+i+'">'+i+'</a></li>';
            }
        }
        if (halaman < jml_halaman) {
            pagination += '<li><a href="javascript:void(0)" data-page="'+(halaman+1)+'">Next &raquo;</a></li>';
        }
    }
    $('.pagination-master-satuan').html(pagination);
</script>
