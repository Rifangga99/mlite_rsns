{if: !empty($barang)}
{loop: $barang}
<tr>
    <td>{$value.kode_item}</td>
    <td>{$value.barcode}</td>
    <td>{$value.nama_barang}</td>
    <td>{$value.kategori}</td>
    <td>{$value.satuan_dasar}</td>
    <td>{?=number_format($value.harga_referensi,0,',','.')?}</td>
    <td>
        {if: $value.status == 'Aktif'}
        <span class="label label-success">Aktif</span>
        {else}
        <span class="label label-danger">Tidak Aktif</span>
        {/if}
    </td>
    <td class="text-right">
        <div class="btn-group">
            <button type="button" class="btn btn-info btn-xs btn-detail-barang" data-id="{?=htmlspecialchars($value.kode_item, ENT_QUOTES)?}" title="Detail"><i class="fa fa-eye"></i></button>
            <button type="button" class="btn btn-success btn-xs btn-edit-barang" data-id="{?=htmlspecialchars($value.kode_item, ENT_QUOTES)?}" title="Edit"><i class="fa fa-edit"></i></button>
            <button type="button" class="btn btn-danger btn-xs btn-hapus-barang" data-id="{?=htmlspecialchars($value.kode_item, ENT_QUOTES)?}" title="Hapus"><i class="fa fa-trash"></i></button>
        </div>
    </td>
</tr>
{/loop}
{else}
<tr><td colspan="8" class="text-center">Belum ada data barang.</td></tr>
{/if}

<script>
    $('#total-data').text('{$jumlah_data}');
    var halaman = {?= (int)$halaman ?};
    var jml_halaman = {?= (int)$jml_halaman ?};
    
    var pagination = '';
    if (jml_halaman > 1) {
        // Previous Button
        if (halaman > 1) {
            pagination += '<li><a href="javascript:void(0)" data-page="'+(halaman-1)+'">&laquo; Prev</a></li>';
        } else {
            pagination += '<li class="disabled"><span>&laquo; Prev</span></li>';
        }

        // Page Numbers
        for (var i = 1; i <= jml_halaman; i++) {
            if (i == halaman) {
                pagination += '<li class="active"><a href="javascript:void(0)" data-page="'+i+'">'+i+'</a></li>';
            } else {
                pagination += '<li><a href="javascript:void(0)" data-page="'+i+'">'+i+'</a></li>';
            }
        }

        // Next Button
        if (halaman < jml_halaman) {
            pagination += '<li><a href="javascript:void(0)" data-page="'+(halaman+1)+'">Next &raquo;</a></li>';
        } else {
            pagination += '<li class="disabled"><span>Next &raquo;</span></li>';
        }
    }
    $('.pagination-master-barang').html(pagination);
</script>
