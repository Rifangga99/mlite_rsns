<div class="modal-header">
    <button type="button" class="close" data-dismiss="modal">&times;</button>
    <h4 class="modal-title">Konfirmasi Pengambilan Barang (Picking) - {$no_sppb}</h4>
</div>
<div class="modal-body">
    <form id="form_picking_save">
        <input type="hidden" name="no_sppb" value="{$no_sppb}">
        <div class="table-responsive">
            <table class="table table-bordered table-condensed">
                <thead>
                    <tr class="bg-primary">
                        <th>Barang</th>
                        <th>Lokasi</th>
                        <th>Jumlah Disetujui</th>
                        <th>Batch (FEFO)</th>
                        <th>Sudah Di-pick</th>
                        <th width="150">Jumlah Ambil</th>
                    </tr>
                </thead>
                <tbody>
                    {loop: $items}
                    <tr>
                        <td>
                            <strong>{$value.nama_barang}</strong><br>
                            <small class="text-muted">{$value.kode_item}</small>
                            <input type="hidden" name="items[{$key}][kode_item]" value="{$value.kode_item}">
                        </td>
                        <td><span class="label label-default">{$value.lokasi_default}</span></td>
                        <td class="text-center">{$value.jumlah_disetujui} {$value.satuan}</td>
                        <td>
                            <select name="items[{$key}][batch_no]" class="form-control input-sm">
                                {loop: $value.batches}
                                <option value="{$value.batch_no}">{$value.batch_no} (Exp: {$value.tgl_expired}) [Stok: {$value.stok}]</option>
                                {/loop}
                                {if: empty($value.batches)}
                                <option value="">Stok Habis / Kosong</option>
                                {/if}
                            </select>
                        </td>
                        <td class="text-center">{$value.qty_picked_total}</td>
                        <td>
                            <div class="input-group input-group-sm">
                                <input type="number" name="items[{$key}][qty]" class="form-control" value="{$value.qty_remaining}" min="0" max="{$value.qty_remaining}">
                                <span class="input-group-addon">{$value.satuan}</span>
                            </div>
                        </td>
                    </tr>
                    {/loop}
                </tbody>
            </table>
        </div>
    </form>
</div>
<div class="modal-footer">
    <button type="button" class="btn btn-default" data-dismiss="modal">Batal</button>
    <button type="button" class="btn btn-primary" onclick="savePicking()">Simpan Picking</button>
</div>

<script>
function savePicking() {
    var formData = $('#form_picking_save').serialize();
    $.post('{?=url(ADMIN."/logistik_non_medis/savepicking")?}', formData, function(response) {
        var res = JSON.parse(response);
        if(res.status == 'success') {
            alert('Data picking berhasil disimpan. No. Packing: ' + res.no_packing);
            $('#modalPacking').modal('hide');
            loadPacking();
        } else {
            alert('Gagal: ' + res.message);
        }
    });
}
</script>
