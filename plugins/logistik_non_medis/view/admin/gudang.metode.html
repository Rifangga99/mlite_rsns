<div class="row">
    <div class="col-md-12">
        <div class="panel panel-default">
            <div class="panel-heading">
                <h3 class="panel-title">Metode FIFO / FEFO</h3>
            </div>
            <div class="panel-body">
                <div class="alert alert-info">
                    <i class="fa fa-info-circle"></i> Pilih metode pengelolaan stok yang akan digunakan. 
                    <strong>FIFO</strong> mengutamakan barang yang masuk duluan, 
                    <strong>FEFO</strong> mengutamakan barang yang mendekati tanggal kedaluwarsa.
                </div>

                <form id="form-metode" class="form-horizontal">
                    <div class="form-group">
                        <label class="col-sm-3 control-label">Metode Pengelolaan Stok</label>
                        <div class="col-sm-9">
                            <div class="radio">
                                <label>
                                    <input type="radio" name="metode" value="FIFO" {if: $metode == 'FIFO'}checked{/if}>
                                    <strong>FIFO</strong> (First In First Out)
                                </label>
                            </div>
                            <div class="radio">
                                <label>
                                    <input type="radio" name="metode" value="FEFO" {if: $metode == 'FEFO'}checked{/if}>
                                    <strong>FEFO</strong> (First Expire First Out)
                                </label>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <div class="col-sm-offset-3 col-sm-9">
                            <button type="submit" class="btn btn-primary"><i class="fa fa-save"></i> Simpan Perubahan</button>
                        </div>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

<script>
$(document).ready(function() {
    $('#form-metode').submit(function(e) {
        e.preventDefault();
        var data = $(this).serialize();
        $.post('{?=url(ADMIN.'/logistik_non_medis/savemetode')?}', data, function(response) {
            if(response.status == 'success') {
                alert('Pengaturan metode berhasil disimpan.');
            } else {
                alert('Gagal menyimpan pengaturan: ' + response.message);
            }
        }, 'json');
    });
});
</script>
