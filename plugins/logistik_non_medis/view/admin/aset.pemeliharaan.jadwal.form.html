<div class="modal-header" style="background-color: #f7f7f7; border-bottom: 1px solid #e5e5e5; border-radius: 8px 8px 0 0;">
    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
    <h4 class="modal-title" style="font-weight: bold; color: #333;">
        <i class="fa fa-calendar-plus-o"></i> {if: $mode == 'edit'}Edit Jadwal PM{else}Tambah Jadwal PM Baru{/if}
    </h4>
</div>
<form id="jadwalForm" onsubmit="event.preventDefault(); saveJadwal();">
    <input type="hidden" name="id" value="{$jadwal.id}">
    <div class="modal-body" style="padding: 20px;">
        <!-- Kode PMJ -->
        <div class="form-group">
            <label style="font-weight: bold; color: #444;">Kode Rencana Jadwal</label>
            <input type="text" class="form-control" value="{$jadwal.kode_pemeliharaan}" readonly style="background-color: #f9f9f9; font-weight: bold; color: #555;">
        </div>
        
        <!-- Live Search Aset -->
        <div class="form-group">
            <label style="font-weight: bold; color: #444;">Cari & Pilih Aset <span class="text-danger">*</span></label>
            <div class="input-group">
                <span class="input-group-addon"><i class="fa fa-search"></i></span>
                <input type="text" id="cari_aset_jadwal" class="form-control" placeholder="Ketik nama atau kode aset..." value="{if: !empty($jadwal.nama_aset)}[{$jadwal.kode_aset}] {$jadwal.nama_aset}{/if}" required>
            </div>
            <input type="hidden" id="kode_aset_jadwal" name="kode_aset" value="{$jadwal.kode_aset}">
            <small class="help-block text-muted">Aset harus dipilih dari daftar hasil pencarian live-search.</small>
        </div>
        
        <!-- Nama Perawatan -->
        <div class="form-group">
            <label style="font-weight: bold; color: #444;">Nama Kegiatan Perawatan <span class="text-danger">*</span></label>
            <input type="text" name="nama_kegiatan" class="form-control" placeholder="Contoh: Kalibrasi Alkes / Servis AC Rutin" value="{$jadwal.nama_kegiatan}" required>
        </div>
        
        <!-- Deskripsi/Instruksi PM -->
        <div class="form-group">
            <label style="font-weight: bold; color: #444;">Instruksi Detail / Deskripsi</label>
            <textarea name="deskripsi" class="form-control" rows="3" placeholder="Masukkan poin-poin yang harus diperiksa...">{$jadwal.deskripsi}</textarea>
        </div>
        
        <div class="row">
            <!-- Frekuensi PM -->
            <div class="col-md-6">
                <div class="form-group">
                    <label style="font-weight: bold; color: #444;">Frekuensi Perulangan <span class="text-danger">*</span></label>
                    <select id="frekuensi_select" name="frekuensi" class="form-control" onchange="toggleKustomDay()">
                        <option value="Sekali Saja" {if: $jadwal.frekuensi == 'Sekali Saja'}selected{/if}>Sekali Saja (Non-Rutin)</option>
                        <option value="1 Bulan" {if: $jadwal.frekuensi == '1 Bulan'}selected{/if}>Setiap 1 Bulan</option>
                        <option value="3 Bulan" {if: $jadwal.frekuensi == '3 Bulan'}selected{/if}>Setiap 3 Bulan</option>
                        <option value="6 Bulan" {if: $jadwal.frekuensi == '6 Bulan'}selected{/if}>Setiap 6 Bulan</option>
                        <option value="1 Tahun" {if: $jadwal.frekuensi == '1 Tahun'}selected{/if}>Setiap 1 Tahun</option>
                        <option value="Kustom" {if: $jadwal.frekuensi == 'Kustom'}selected{/if}>Interval Kustom (Hari)</option>
                    </select>
                </div>
            </div>
            
            <!-- Tanggal Direncanakan -->
            <div class="col-md-6">
                <div class="form-group">
                    <label style="font-weight: bold; color: #444;">Tanggal Mulai / Jatuh Tempo <span class="text-danger">*</span></label>
                    <input type="date" name="tanggal_direncanakan" class="form-control" value="{$jadwal.tanggal_direncanakan}" required>
                </div>
            </div>
        </div>
        
        <!-- Hari Kustom (shown if Kustom selected) -->
        <div id="kustom_hari_group" class="form-group" style="{if: $jadwal.frekuensi != 'Kustom'}display: none;{/if}">
            <label style="font-weight: bold; color: #444;">Ulangi Setiap Berapa Hari? <span class="text-danger">*</span></label>
            <div class="input-group">
                <input type="number" name="hari_kustom" class="form-control" min="1" value="{$jadwal.hari_kustom}">
                <span class="input-group-addon">Hari</span>
            </div>
        </div>
    </div>
    
    <div class="modal-footer" style="background-color: #f7f7f7; border-top: 1px solid #e5e5e5; border-radius: 0 0 8px 8px;">
        <button type="button" class="btn btn-default" data-dismiss="modal"><i class="fa fa-times"></i> Batal</button>
        <button type="submit" class="btn btn-primary"><i class="fa fa-save"></i> Simpan Jadwal</button>
    </div>
</form>

<script>
$(function() {
    // Autocomplete untuk pencarian aset di form jadwal
    $("#cari_aset_jadwal").autocomplete({
        source: "{?=url(ADMIN.'/logistik_non_medis/searchasetautocomplete')?}",
        minLength: 1,
        select: function(event, ui) {
            $("#kode_aset_jadwal").val(ui.item.kode_aset);
            $("#cari_aset_jadwal").val(ui.item.label);
            return false;
        }
    });
});

function toggleKustomDay() {
    var val = $('#frekuensi_select').val();
    if (val === 'Kustom') {
        $('#kustom_hari_group').slideDown();
    } else {
        $('#kustom_hari_group').slideUp();
    }
}
</script>
